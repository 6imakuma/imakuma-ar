<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR認識テスト</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin:0; overflow:hidden; }
        .guide {
            position: fixed;
            top: 10px;
            width: 100%;
            text-align: center;
            background: rgba(255,255,255,0.9);
            color: #000;
            font-size: 22px;
            font-weight: bold;
            padding: 10px;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="guide">AR認識テスト　marker1を映してください</div>

<a-scene embedded vr-mode-ui="enabled: false" arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; facingMode: environment;">

    <a-marker type="pattern" url="marker1.patt">
        <a-box position="0 0.5 0" material="color: red;"></a-box>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

</body>
</html>
